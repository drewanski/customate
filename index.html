<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon — shown in browser tab + when domain is shared/bookmarked. -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Page title — shows in browser tab, OS task switcher, search results. -->
    <title>CustoMate — Custom 3D Merch Design Studio</title>

    <!-- Meta description for SEO + when the domain is linked on social media. -->
    <meta name="description" content="Design and order custom merchandise — t-shirts, mugs, totes, jerseys and more — with a real 3D preview. Powered by AI." />

    <!-- Open Graph (Facebook, Messenger, LinkedIn link previews) -->
    <meta property="og:title" content="CustoMate — Custom 3D Merch Design" />
    <meta property="og:description" content="Design custom merch with a live 3D preview before you order." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:url" content="https://customate.live" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CustoMate — Custom 3D Merch Design" />
    <meta name="twitter:description" content="Design custom merch with a live 3D preview before you order." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- Theme color for mobile browser chrome -->
    <meta name="theme-color" content="#2563eb" />

    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
